<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streamlabs Overlay - Real-Time Viewer Counter</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="viewers-page">

  <div class="viewer-counter-container" id="viewers-container">
    <!-- Twitch Badge -->
    <div class="platform-pill twitch" id="twitch-pill">
      <span class="platform-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.571 4.714h1.715v5.143H11.571V4.714zm4.715 0H18v5.143h-1.714V4.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0H6zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714v9.429z"/>
        </svg>
      </span>
      <span class="status-dot" id="twitch-dot"></span>
      <span class="count-number" id="twitch-count">0</span>
    </div>

    <!-- YouTube Badge -->
    <div class="platform-pill youtube" id="youtube-pill">
      <span class="platform-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
      </span>
      <span class="status-dot" id="youtube-dot"></span>
      <span class="count-number" id="youtube-count">0</span>
    </div>

    <!-- Total Viewers Badge -->
    <div class="platform-pill total" id="total-pill">
      <span style="font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8;">TOTAL:</span>
      <span class="count-number" id="total-count">0</span>
    </div>
  </div>

  <script>
    const socket = io();

    const container = document.getElementById('viewers-container');
    const twitchPill = document.getElementById('twitch-pill');
    const twitchCount = document.getElementById('twitch-count');
    const twitchDot = document.getElementById('twitch-dot');

    const youtubePill = document.getElementById('youtube-pill');
    const youtubeCount = document.getElementById('youtube-count');
    const youtubeDot = document.getElementById('youtube-dot');

    const totalPill = document.getElementById('total-pill');
    const totalCount = document.getElementById('total-count');

    // Parse URL query params
    const urlParams = new URLSearchParams(window.location.search);

    let activeConfig = {
      showTwitch: urlParams.has('twitch') ? urlParams.get('twitch') !== 'false' : true,
      showYoutube: urlParams.has('yt') ? urlParams.get('yt') !== 'false' : true,
      showTotal: urlParams.has('total') ? urlParams.get('total') !== 'false' : true,
      showBg: urlParams.has('bg') ? urlParams.get('bg') !== 'false' : true,
      layout: urlParams.get('layout') || 'horizontal'
    };

    socket.on('config_update', (config) => {
      if (config && config.viewers) {
        if (!urlParams.has('twitch')) activeConfig.showTwitch = config.viewers.showTwitch;
        if (!urlParams.has('yt')) activeConfig.showYoutube = config.viewers.showYoutube;
        if (!urlParams.has('total')) activeConfig.showTotal = config.viewers.showTotal;
        if (!urlParams.has('bg')) activeConfig.showBg = config.viewers.showBg;
        if (!urlParams.has('layout')) activeConfig.layout = config.viewers.layout;
        applyConfig();
      }
    });

    function applyConfig() {
      twitchPill.style.display = activeConfig.showTwitch ? 'flex' : 'none';
      youtubePill.style.display = activeConfig.showYoutube ? 'flex' : 'none';
      totalPill.style.display = activeConfig.showTotal ? 'flex' : 'none';

      if (activeConfig.showBg) {
        container.style.background = 'rgba(15, 23, 42, 0.85)';
        container.style.border = '1px solid var(--card-border)';
        container.style.boxShadow = '0 8px 32px rgba(0, 0, 0, 0.4)';
      } else {
        container.style.background = 'transparent';
        container.style.border = 'none';
        container.style.boxShadow = 'none';
      }

      if (activeConfig.layout === 'vertical') {
        container.style.flexDirection = 'column';
        container.style.borderRadius = '20px';
      } else {
        container.style.flexDirection = 'row';
        container.style.borderRadius = '50px';
      }
    }

    socket.on('status_update', (data) => {
      // Twitch Update
      twitchCount.innerText = data.twitch.viewers.toLocaleString();
      if (data.twitch.isLive) {
        twitchDot.classList.add('online');
      } else {
        twitchDot.classList.remove('online');
      }

      // YouTube Update
      youtubeCount.innerText = data.youtube.viewers.toLocaleString();
      if (data.youtube.isLive) {
        youtubeDot.classList.add('online');
      } else {
        youtubeDot.classList.remove('online');
      }

      // Total Update
      totalCount.innerText = data.totalViewers.toLocaleString();
    });

    applyConfig();
  </script>
</body>
</html>
