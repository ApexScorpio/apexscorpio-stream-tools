<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexScorpio - Alert Box Overlay (Brandkit Clipart)</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }
    .alert-box {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px 48px;
      background: rgba(8, 8, 12, 0.96);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 2px solid #E8181F;
      border-radius: 24px;
      box-shadow: 0 10px 45px rgba(0, 0, 0, 0.95), 0 0 40px rgba(232, 24, 31, 0.5);
      animation: alertPopIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }
    .alert-header-img {
      max-width: 130px;
      max-height: 110px;
      height: auto;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 15px rgba(232, 24, 31, 0.6));
    }
    .platform-logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .alert-title {
      font-family: 'Orbitron', 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #E8181F;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .alert-message {
      font-family: 'Outfit', sans-serif;
      font-size: 30px;
      font-weight: 900;
      color: #FFFFFF;
      margin-top: 6px;
    }
    .alert-subtext {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #94A3B8;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @keyframes alertPopIn {
      0% { opacity: 0; transform: scale(0.5) translateY(50px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="alert-box" id="alert-box">
    <img src="/brandkit/Apex_Scorpio_Brand_Assets/03_Scorpion/Apex_Scorpion_Full_Metallic.png" class="alert-header-img" id="alert-img" alt="Brandkit Clipart">
    <div class="platform-logo-container" id="logo-box"></div>
    <div class="alert-title" id="alert-title">NOVO SEGUIDOR!</div>
    <div class="alert-message" id="alert-message">GamerScorpio</div>
    <div class="alert-subtext" id="alert-subtext">Acabou de seguir!</div>
  </div>

  <script>
    const socket = io();
    const alertBox = document.getElementById('alert-box');
    const alertImg = document.getElementById('alert-img');
    const logoBox = document.getElementById('logo-box');
    const alertTitle = document.getElementById('alert-title');
    const alertMessage = document.getElementById('alert-message');
    const alertSubtext = document.getElementById('alert-subtext');

    const twitchSvg = `<svg width="28" height="28" viewBox="0 0 24 24" fill="#9146FF"><path d="M11.571 4.714h1.715v5.143H11.571V4.714zm4.715 0H18v5.143h-1.714V4.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0H6zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714v9.429z"/></svg>`;
    const youtubeSvg = `<svg width="32" height="32" viewBox="0 0 24 24" fill="#E8181F"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;
    const facebookSvg = `<svg width="30" height="30" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`;

    const clipartMap = {
      follower: '/brandkit/Apex_Scorpio_Brand_Assets/03_Scorpion/Apex_Scorpion_Full_Metallic.png',
      subscriber: '/brandkit/Apex_Scorpio_Brand_Assets/02_Jewel/AS_Jewel_Full_Metallic.png',
      raid: '/brandkit/Apex_Scorpio_Brand_Assets/03_Scorpion/Apex_Stinger_A_Symbol.png'
    };

    let alertQueue = [];
    let isShowingAlert = false;

    function playAlertSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.3);

        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      } catch (e) {}
    }

    socket.on('new_event', (event) => {
      alertQueue.push(event);
      processAlertQueue();
    });

    function processAlertQueue() {
      if (isShowingAlert || alertQueue.length === 0) return;

      isShowingAlert = true;
      const event = alertQueue.shift();

      const platformSvg = event.platform === 'youtube' ? youtubeSvg : (event.platform === 'facebook' ? facebookSvg : twitchSvg);
      const platformName = event.platform === 'youtube' ? 'YouTube' : (event.platform === 'facebook' ? 'Facebook' : 'Twitch');
      logoBox.innerHTML = platformSvg;

      // Assign specific Brandkit Clipart image per alert type
      alertImg.src = clipartMap[event.type] || clipartMap.follower;

      if (event.type === 'follower') {
        alertTitle.innerText = 'NOVO SEGUIDOR!';
        alertTitle.style.color = '#E8181F';
        alertBox.style.borderColor = '#E8181F';
        alertMessage.innerText = `@${event.username}`;
        alertSubtext.innerHTML = `Acabou de seguir no ${platformName}!`;
      } else if (event.type === 'subscriber') {
        alertTitle.innerText = 'NOVO SUBSCRICTOR!';
        alertTitle.style.color = '#F59E0B';
        alertBox.style.borderColor = '#F59E0B';
        alertMessage.innerText = `@${event.username}`;
        alertSubtext.innerHTML = `Inscreveu-se com sucesso no ${platformName}!`;
      } else if (event.type === 'raid') {
        alertTitle.innerText = 'RAID EM DIRETO!';
        alertTitle.style.color = '#9146FF';
        alertBox.style.borderColor = '#9146FF';
        alertMessage.innerText = `@${event.username}`;
        alertSubtext.innerHTML = `Entrou em raid com ${event.viewers || 15} espectadores!`;
      }

      playAlertSound();
      alertBox.style.display = 'flex';

      setTimeout(() => {
        alertBox.style.display = 'none';
        isShowingAlert = false;
        setTimeout(processAlertQueue, 500);
      }, 5000);
    }
  </script>
</body>
</html>
