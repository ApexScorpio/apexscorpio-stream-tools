<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexScorpio - Alert Box Overlay</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }
    .alert-box {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px 40px;
      background: rgba(11, 15, 25, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid #38BDF8;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(56, 189, 248, 0.4);
      animation: alertPopIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }
    .platform-logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .alert-title {
      font-family: 'Orbitron', 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: #38BDF8;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .alert-message {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #FFFFFF;
      margin-top: 6px;
    }
    .alert-subtext {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #94A3B8;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @keyframes alertPopIn {
      0% { opacity: 0; transform: scale(0.5) translateY(50px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="alert-box" id="alert-box">
    <div class="platform-logo-container" id="logo-box"></div>
    <div class="alert-title" id="alert-title">NOVO SEGUIDOR!</div>
    <div class="alert-message" id="alert-message">GamerScorpio</div>
    <div class="alert-subtext" id="alert-subtext">Acabou de seguir!</div>
  </div>

  <script>
    const socket = io();
    const alertBox = document.getElementById('alert-box');
    const logoBox = document.getElementById('logo-box');
    const alertTitle = document.getElementById('alert-title');
    const alertMessage = document.getElementById('alert-message');
    const alertSubtext = document.getElementById('alert-subtext');

    const twitchSvg = `<svg width="32" height="32" viewBox="0 0 24 24" fill="#A855F7"><path d="M11.571 4.714h1.715v5.143H11.571V4.714zm4.715 0H18v5.143h-1.714V4.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0H6zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714v9.429z"/></svg>`;
    const youtubeSvg = `<svg width="36" height="36" viewBox="0 0 24 24" fill="#EF4444"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;

    let alertQueue = [];
    let isShowingAlert = false;

    function playAlertSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.3);

        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      } catch (e) {}
    }

    socket.on('new_event', (event) => {
      alertQueue.push(event);
      processAlertQueue();
    });

    function processAlertQueue() {
      if (isShowingAlert || alertQueue.length === 0) return;

      isShowingAlert = true;
      const event = alertQueue.shift();

      const platformSvg = event.platform === 'youtube' ? youtubeSvg : twitchSvg;
      const platformName = event.platform === 'youtube' ? 'YouTube' : 'Twitch';
      logoBox.innerHTML = platformSvg;

      if (event.type === 'follower') {
        alertTitle.innerText = 'NOVO SEGUIDOR!';
        alertTitle.style.color = '#38BDF8';
        alertBox.style.borderColor = '#38BDF8';
        alertMessage.innerText = `@${event.username}`;
        alertSubtext.innerHTML = `Acabou de seguir no ${platformName}!`;
      } else if (event.type === 'subscriber') {
        alertTitle.innerText = 'NOVO SUBSCRICTOR!';
        alertTitle.style.color = '#F59E0B';
        alertBox.style.borderColor = '#F59E0B';
        alertMessage.innerText = `@${event.username}`;
        alertSubtext.innerHTML = `Inscreveu-se com sucesso no ${platformName}!`;
      } else if (event.type === 'raid') {
        alertTitle.innerText = 'RAID EM DIRETO!';
        alertTitle.style.color = '#A855F7';
        alertBox.style.borderColor = '#A855F7';
        alertMessage.innerText = `@${event.username}`;
        alertSubtext.innerHTML = `Entrou em raid na Twitch com ${event.viewers || 15} espectadores!`;
      }

      playAlertSound();
      alertBox.style.display = 'flex';

      setTimeout(() => {
        alertBox.style.display = 'none';
        isShowingAlert = false;
        setTimeout(processAlertQueue, 500);
      }, 5000);
    }
  </script>
</body>
</html>
