<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexScorpio - Recent Events Ticker</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 10px;
    }
    .ticker-bar {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      padding: 8px 18px;
      background: rgba(11, 15, 25, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 15px rgba(56, 189, 248, 0.15);
      position: relative;
      overflow: hidden;
    }
    .ticker-bar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #38BDF8, #8B5CF6, #EF4444);
    }
    .ticker-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #F8FAFC;
      white-space: nowrap;
    }
    .ticker-label {
      color: #94A3B8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .ticker-value {
      color: #38BDF8;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .ticker-divider {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }
    .platform-icon-sm {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="ticker-bar" id="ticker-bar">
    <div class="ticker-item">
      <span class="ticker-label">Último Follow:</span>
      <span class="ticker-value" id="last-follower">--</span>
    </div>
    <div class="ticker-divider"></div>
    <div class="ticker-item">
      <span class="ticker-label">Último Sub:</span>
      <span class="ticker-value" style="color: #F59E0B;" id="last-subscriber">--</span>
    </div>
    <div class="ticker-divider"></div>
    <div class="ticker-item">
      <span class="ticker-label">Último Raid:</span>
      <span class="ticker-value" style="color: #A855F7;" id="last-raid">--</span>
    </div>
  </div>

  <script>
    const socket = io();

    const twitchIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="#A855F7"><path d="M11.571 4.714h1.715v5.143H11.571V4.714zm4.715 0H18v5.143h-1.714V4.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0H6zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714v9.429z"/></svg>`;
    const youtubeIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="#EF4444"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;

    socket.on('events_update', (events) => {
      if (events.lastFollower) {
        document.getElementById('last-follower').innerHTML = `${events.lastFollower.includes('YouTube') ? youtubeIcon : twitchIcon} ${events.lastFollower}`;
      }
      if (events.lastSubscriber) {
        document.getElementById('last-subscriber').innerHTML = `${events.lastSubscriber.includes('YouTube') ? youtubeIcon : twitchIcon} ${events.lastSubscriber}`;
      }
      if (events.lastRaid) {
        document.getElementById('last-raid').innerHTML = `${twitchIcon} ${events.lastRaid}`;
      }
    });

    socket.on('new_event', (event) => {
      const icon = event.platform === 'youtube' ? youtubeIcon : twitchIcon;
      if (event.type === 'follower') {
        document.getElementById('last-follower').innerHTML = `${icon} @${event.username}`;
      } else if (event.type === 'subscriber') {
        document.getElementById('last-subscriber').innerHTML = `${icon} @${event.username}`;
      } else if (event.type === 'raid') {
        document.getElementById('last-raid').innerHTML = `${twitchIcon} @${event.username} (${event.viewers || 10} viewers)`;
      }
    });
  </script>
</body>
</html>
