<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexScorpio - Activity Feed Ticker (Event List)</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 100vw;
      height: 100vh;
      padding: 12px;
    }
    .ticker-container {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      padding: 10px 24px;
      background: rgba(8, 8, 12, 0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(232, 24, 31, 0.35);
      border-radius: 50px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 20px rgba(232, 24, 31, 0.25);
      animation: fadeIn 0.5s ease-out;
      position: relative;
    }
    .ticker-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #E8181F, #9146FF, #E8181F);
    }
    .ticker-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #F1F5F9;
    }
    .ticker-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 800;
      color: #E8181F;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .ticker-value {
      color: #FFFFFF;
      font-weight: 800;
    }
    .divider {
      width: 1px;
      height: 18px;
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="ticker-container">
    <div class="ticker-item">
      <span class="ticker-label">🔔 ÚLTIMO FOLLOWER:</span>
      <span class="ticker-value" id="last-follower">@GamerGurl_99</span>
    </div>
    <div class="divider"></div>
    <div class="ticker-item">
      <span class="ticker-label">⭐ ÚLTIMO SUB:</span>
      <span class="ticker-value" id="last-subscriber">@ApexFanatic</span>
    </div>
    <div class="divider"></div>
    <div class="ticker-item">
      <span class="ticker-label">🚀 ÚLTIMA RAID:</span>
      <span class="ticker-value" id="last-raid">@StreamMaster (25)</span>
    </div>
  </div>

  <script>
    const socket = io();
    const elFollower = document.getElementById('last-follower');
    const elSub = document.getElementById('last-subscriber');
    const elRaid = document.getElementById('last-raid');

    socket.on('events_update', (events) => {
      if (events.lastFollower) elFollower.innerText = events.lastFollower;
      if (events.lastSubscriber) elSub.innerText = events.lastSubscriber;
      if (events.lastRaid) elRaid.innerText = events.lastRaid;
    });

    socket.on('new_event', (event) => {
      const platName = event.platform.toUpperCase();
      if (event.type === 'follower') {
        elFollower.innerText = `@${event.username} (${platName})`;
      } else if (event.type === 'subscriber') {
        elSub.innerText = `@${event.username} (${platName})`;
      } else if (event.type === 'raid') {
        elRaid.innerText = `@${event.username} (${event.viewers || 15} espectadores)`;
      }
    });
  </script>
</body>
</html>
