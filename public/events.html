<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexScorpio - Event List Overlay</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      background: transparent;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      width: 100vw;
      height: 100vh;
      padding: 12px;
    }
    .event-list-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 360px;
      max-height: 90vh;
      overflow: hidden;
    }
    .event-card {
      background: rgba(8, 8, 12, 0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(232, 24, 31, 0.35);
      border-left: 4px solid #E8181F;
      border-radius: 0 12px 12px 0;
      padding: 10px 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      animation: slideInFromLeft 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .event-card.follower {
      border-left-color: #E8181F;
    }
    .event-card.subscriber {
      border-left-color: #F59E0B;
    }
    .event-card.raid {
      border-left-color: #9146FF;
    }
    .event-icon {
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .event-info {
      display: flex;
      flex-direction: column;
    }
    .event-user {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: #FFFFFF;
    }
    .event-action {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #94A3B8;
      font-weight: 600;
    }

    @keyframes slideInFromLeft {
      0% {
        opacity: 0;
        transform: translateX(-30px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <div class="event-list-container" id="event-feed">
    <!-- Initial Default Feed Items -->
    <div class="event-card subscriber">
      <div class="event-icon">⭐</div>
      <div class="event-info">
        <div class="event-user">@ApexFanatic</div>
        <div class="event-action">subscribed on YouTube</div>
      </div>
    </div>

    <div class="event-card follower">
      <div class="event-icon">🔔</div>
      <div class="event-info">
        <div class="event-user">@GamerGurl_99</div>
        <div class="event-action">followed on Twitch</div>
      </div>
    </div>

    <div class="event-card raid">
      <div class="event-icon">🚀</div>
      <div class="event-info">
        <div class="event-user">@StreamMaster</div>
        <div class="event-action">raided with 25 viewers</div>
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    const feed = document.getElementById('event-feed');

    socket.on('new_event', (event) => {
      addEventCard(event);
    });

    function addEventCard(event) {
      const card = document.createElement('div');
      const platName = event.platform ? event.platform.charAt(0).toUpperCase() + event.platform.slice(1) : 'Twitch';
      
      let icon = '🔔';
      let actionText = `followed on ${platName}`;
      let eventClass = 'follower';

      if (event.type === 'subscriber') {
        icon = '⭐';
        actionText = `subscribed on ${platName}`;
        eventClass = 'subscriber';
      } else if (event.type === 'raid') {
        icon = '🚀';
        actionText = `raided with ${event.viewers || 15} viewers`;
        eventClass = 'raid';
      }

      card.className = `event-card ${eventClass}`;
      card.innerHTML = `
        <div class="event-icon">${icon}</div>
        <div class="event-info">
          <div class="event-user">@${event.username}</div>
          <div class="event-action">${actionText}</div>
        </div>
      `;

      // Insert at top of vertical list
      feed.insertBefore(card, feed.firstChild);

      // Keep maximum 8 events in history feed
      if (feed.children.length > 8) {
        feed.removeChild(feed.lastChild);
      }
    }
  </script>
</body>
</html>
