<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ApexScorpio - Unified Chat Overlay</title>
  <link rel="stylesheet" href="css/style.css?v=6.2">
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5.3.4/dist/mqtt.min.js"></script>
  <script>
    window.APEX_YOUTUBE_BACKEND_URL = 'https://oauthfix--apexscorpio-youtube-scraper-6e2678f9.netlify.app';
  </script>
  <script src="youtube-live.js?v=4.2"></script>
</head>
<body class="chat-page">
  <div class="chat-container has-bg" id="chat-container"></div>

  <script>
    const chatContainer = document.getElementById('chat-container');

    let cfg = {
      showTwitch: true, showYoutube: true, showFacebook: true,
      fadeSeconds: 0, showBg: true, displayMode: 'pill',
      fontSize: 14, showBadges: true, maxMessages: 50
    };
    let lastConfigUpdatedAt = 0;
    const expiryTimers = new Map();

    function normalizeFadeSeconds(value) {
      const seconds = Number(value);
      return Number.isFinite(seconds) && seconds > 0 ? seconds : 0;
    }

    function cancelMessageExpiry(element) {
      const timer = expiryTimers.get(element);
      if (timer) clearTimeout(timer);
      expiryTimers.delete(element);
    }

    function cancelAllMessageExpiries() {
      expiryTimers.forEach(timer => clearTimeout(timer));
      expiryTimers.clear();
    }

    function applyIncomingChatConfig(config) {
      if (!config || typeof config !== 'object') return;
      const updatedAt = Number(config._updatedAt || 0);
      if (lastConfigUpdatedAt > 0 && updatedAt === 0) return;
      if (updatedAt > 0 && updatedAt < lastConfigUpdatedAt) return;
      if (updatedAt > 0) lastConfigUpdatedAt = updatedAt;
      cfg = { ...cfg, ...config };
      cfg.fadeSeconds = normalizeFadeSeconds(cfg.fadeSeconds);
      applyConfig();
    }

    function loadSavedConfig() {
      try {
        const saved = localStorage.getItem('apex_cfg_chat');
        if (saved) {
          const parsed = JSON.parse(saved);
          cfg = { ...cfg, ...parsed };
          lastConfigUpdatedAt = Number(parsed._updatedAt || 0);
        }
      } catch(e) {}

      const p = new URLSearchParams(window.location.search);
      if (p.has('tw')) cfg.showTwitch = p.get('tw') === '1' || p.get('tw') === 'true';
      if (p.has('yt')) cfg.showYoutube = p.get('yt') === '1' || p.get('yt') === 'true';
      if (p.has('fb')) cfg.showFacebook = p.get('fb') === '1' || p.get('fb') === 'true';
      if (p.has('mode')) cfg.displayMode = p.get('mode');
      if (p.has('fade')) cfg.fadeSeconds = normalizeFadeSeconds(p.get('fade'));
      if (p.has('bg')) cfg.showBg = p.get('bg') === '1' || p.get('bg') === 'true';
      if (p.has('bdg')) cfg.showBadges = p.get('bdg') === '1' || p.get('bdg') === 'true';
      if (p.has('fs')) cfg.fontSize = Number(p.get('fs')) || 14;
      if (p.has('max')) cfg.maxMessages = Number(p.get('max')) || 50;
    }

    const icons = {
      twitch:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="#FFF"><path d="M11.571 4.714h1.715v5.143H11.571V4.714zm4.715 0H18v5.143h-1.714V4.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0H6zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714v9.429z"/></svg>`,
      youtube:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="#FFF"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`,
      facebook: `<svg width="14" height="14" viewBox="0 0 24 24" fill="#FFF"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`,
    };

    const platformColors = { twitch: '#9146FF', youtube: '#E8181F', facebook: '#1877F2' };

    const bc = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('apex_scorpio_stream_tools') : null;

    const _seenIds = new Set();
    const youtubeEventRelayClients = [];
    function _isDuplicate(type, payload) {
      const key = type + '|' + (payload?.id || '') + '|' + (payload?.username || '') + '|' + (payload?.message || payload?.msg?.message || '');
      if (_seenIds.has(key)) return true;
      _seenIds.add(key);
      setTimeout(() => _seenIds.delete(key), 3000);
      return false;
    }

    function doClearChat(onlyTests = false) {
      const container = document.getElementById('chat-container') || chatContainer;
      if (container) {
        Array.from(container.children).forEach(child => {
          if (!onlyTests || child.classList.contains('is-test-msg')) {
            cancelMessageExpiry(child);
            child.style.animation = 'none';
            child.style.transition = 'none';
            child.remove();
          }
        });
        if (!onlyTests) {
          container.innerHTML = '';
          while (container.firstChild) {
            container.removeChild(container.firstChild);
          }
        }
      }
      _seenIds.clear();
    }

    function handleIncomingData(type, payload) {
      if (!type) return;
      const typeStr = String(type).toLowerCase();
      if (typeStr.includes('clear')) {
        doClearChat(typeStr.includes('test') || payload?.onlyTests || false);
        return;
      }
      if (type === 'config_update') {
        const config = payload.chat || payload.config || payload;
        if (config) applyIncomingChatConfig(config);
      }
      if (type === 'chat_message' && payload) {
        if (_isDuplicate(type, payload?.msg || payload)) return;
        const msg = payload.msg || payload;
        const platform = (msg.platform || 'twitch').toLowerCase();
        if (platform === 'twitch'   && !cfg.showTwitch)   return;
        if (platform === 'youtube'  && !cfg.showYoutube)  return;
        if (platform === 'facebook' && !cfg.showFacebook) return;
        addMsg(msg, platform);
      }
    }

    // Multi-Broker Cloud Relay (Port 443 HTTPS + 8000 + 8084)
    const MQTT_BROKERS = [
      'wss://broker.emqx.io:443/mqtt',
      'wss://broker.hivemq.com:8000/mqtt',
      'wss://broker.emqx.io:8084/mqtt'
    ];

    if (typeof mqtt !== 'undefined') {
      MQTT_BROKERS.forEach(url => {
        try {
          const mqttClient = mqtt.connect(url, {
            reconnectPeriod: 5000,
            clientId: 'scorpio_chat_' + Math.random().toString(16).substring(2, 8),
            connectTimeout: 4000,
            keepalive: 30
          });

          youtubeEventRelayClients.push(mqttClient);

          mqttClient.on('connect', () => {
            mqttClient.subscribe('apexscorpio/streamtools/v1/#');
          });
          mqttClient.on('message', (topic, message) => {
            try {
              const data = JSON.parse(message.toString());
              const topicStr = String(topic).toLowerCase();
              const dataStr = JSON.stringify(data).toLowerCase();

              if (topicStr.includes('clear') || dataStr.includes('clear')) {
                doClearChat(data.onlyTests || topicStr.includes('test') || dataStr.includes('test'));
                return;
              }

              if (topicStr.includes('/cfg/chat')) {
                applyIncomingChatConfig(data);
              } else if (data && (data.type || data.payload)) {
                handleIncomingData(data.type || data.payload?.type, data.payload || data);
              }
            } catch(err) {}
          });
        } catch(e) {}
      });
    }

    if (bc) {
      bc.onmessage = (e) => {
        if (e.data) handleIncomingData(e.data.type, e.data.data || e.data);
      };
    }

    window.addEventListener('message', (e) => {
      if (e.data) handleIncomingData(e.data.type, e.data.data || e.data);
    });

    window.addEventListener('storage', (e) => {
      if (e.key && e.key.startsWith('apex_event_') && e.newValue) {
        try {
          const parsed = JSON.parse(e.newValue);
          const type = e.key.replace('apex_event_', '');
          handleIncomingData(type, parsed.payload);
        } catch(err) {}
      }
    });

    // Real Twitch IRC via direct WebSocket (no tmi.js dependency)
    (function connectTwitchChat() {
      const TWITCH_CHANNEL = 'apexscorpio';
      let twitchWs = null;
      let twitchReconnectTimer = null;
      let twitchConnected = false;

      function twitchConnect() {
        try {
          if (twitchWs) { try { twitchWs.close(); } catch(e) {} }
          twitchWs = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

          twitchWs.onopen = () => {
            twitchConnected = true;
            twitchWs.send('PASS SCHMOOPIIE');
            twitchWs.send('NICK justinfan' + Math.floor(Math.random() * 99999));
            twitchWs.send('CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership');
            twitchWs.send('JOIN #' + TWITCH_CHANNEL);
          };

          twitchWs.onmessage = (event) => {
            const lines = event.data.split('\r\n').filter(Boolean);
            lines.forEach(line => {
              if (line.startsWith('PING')) {
                twitchWs.send('PONG :tmi.twitch.tv');
                return;
              }
              if (!line.includes('PRIVMSG')) return;

              // Parse IRC tags
              let tagStr = '', rest = line;
              if (line.startsWith('@')) {
                const spaceIdx = line.indexOf(' ');
                tagStr = line.substring(1, spaceIdx);
                rest = line.substring(spaceIdx + 1);
              }
              const tags = {};
              tagStr.split(';').forEach(pair => {
                const [k, v] = pair.split('=');
                if (k) tags[k] = v || '';
              });

              // Extract username and message
              const nickMatch = rest.match(/^:([^!]+)!/);
              const msgMatch = rest.match(/PRIVMSG #[^ ]+ :(.*)$/);
              if (!nickMatch || !msgMatch) return;

              const username = tags['display-name'] || nickMatch[1];
              const message  = msgMatch[1];
              const color    = tags['color'] || '#9146FF';
              const isBroadcaster = (tags['badges'] || '').includes('broadcaster');
              const isMod         = tags['mod'] === '1';
              const isSub         = (tags['badges'] || '').includes('subscriber');

              if (!cfg.showTwitch) return;

              addMsg({
                id: tags['id'] || `tw-${Date.now()}`,
                platform: 'twitch',
                username,
                userColor: color,
                message,
                badges: { broadcaster: isBroadcaster, mod: isMod, subscriber: isSub },
                isTest: false,
                timestamp: new Date().toISOString()
              }, 'twitch');
            });
          };

          twitchWs.onclose = () => {
            twitchConnected = false;
            // Reconnect after 5 seconds
            if (twitchReconnectTimer) clearTimeout(twitchReconnectTimer);
            twitchReconnectTimer = setTimeout(twitchConnect, 5000);
          };

          twitchWs.onerror = () => {
            twitchConnected = false;
          };
        } catch(e) {}
      }

      twitchConnect();
    })();

    function applyConfig() {
      cfg.fadeSeconds = normalizeFadeSeconds(cfg.fadeSeconds);
      if (cfg.fadeSeconds === 0) cancelAllMessageExpiries();

      if (cfg.showBg) {
        chatContainer.classList.add('has-bg');
        chatContainer.classList.remove('no-bg');
      } else {
        chatContainer.classList.remove('has-bg');
        chatContainer.classList.add('no-bg');
      }

      chatContainer.querySelectorAll('.chat-message').forEach(msg => {
        msg.style.fontSize = (cfg.fontSize || 14) + 'px';
        msg.classList.toggle('mode-pill', cfg.displayMode !== 'compact');
        msg.classList.toggle('mode-compact', cfg.displayMode === 'compact');
      });
      chatContainer.querySelectorAll('.chat-text').forEach(el => {
        el.style.fontSize = (cfg.fontSize || 14) + 'px';
      });
    }

    function addMsg(msg, platform) {
      const el = document.createElement('div');
      const mode = cfg.displayMode === 'compact' ? 'mode-compact' : 'mode-pill';
      const isTestClass = msg.isTest ? 'is-test-msg' : 'is-real-msg';
      el.className = `chat-message ${platform} ${mode} ${isTestClass}`;
      el.style.fontSize = (cfg.fontSize || 14) + 'px';

      let badgesHtml = '';
      if (cfg.showBadges) {
        badgesHtml = `<span class="platform-badge ${platform}">${icons[platform] || icons.twitch}</span>`;
        if (msg.badges) {
          if (msg.badges.broadcaster) badgesHtml += `<span class="role-badge" style="background:#E8181F">HOST</span>`;
          else if (msg.badges.mod)    badgesHtml += `<span class="role-badge" style="background:#00C8FF;color:#000">MOD</span>`;
          else if (msg.badges.subscriber) badgesHtml += `<span class="role-badge" style="background:#F59E0B;color:#000">SUB</span>`;
        }
      }

      const color = msg.userColor || platformColors[platform] || '#FFF';
      el.innerHTML = `
        <div class="chat-header">
          ${badgesHtml}
          <span class="user-name" style="color:${color}">${msg.username}</span>
        </div>
        <div class="chat-text" style="font-size:${cfg.fontSize || 14}px">${esc(msg.message)}</div>
      `;

      chatContainer.appendChild(el);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      while (chatContainer.children.length > (cfg.maxMessages || 50)) {
        cancelMessageExpiry(chatContainer.firstChild);
        chatContainer.removeChild(chatContainer.firstChild);
      }

      // Permanent means permanent — only set timer if fadeSeconds > 0
      const fadeDur = normalizeFadeSeconds(cfg.fadeSeconds);
      if (fadeDur > 0) {
        const expiryTimer = setTimeout(() => {
          expiryTimers.delete(el);
          if (!el.isConnected) return;
          el.style.animation = 'none';
          el.classList.add('exiting');
          setTimeout(() => el.remove(), 380);
        }, fadeDur * 1000);
        expiryTimers.set(el, expiryTimer);
      }
      // fadeDur === 0 → message stays on screen permanently, no timer set.
    }

    function esc(str) {
      const d = document.createElement('div');
      d.innerText = str;
      return d.innerHTML;
    }

    function relayYoutubeEvent(event, attempt = 0) {
      if (!event) return;

      if (attempt === 0) {
        if (bc) {
          try {
            bc.postMessage({
              type: 'new_event',
              data: event
            });
          } catch (_) {}
        }

        try {
          localStorage.setItem(
            'apex_event_new_event',
            JSON.stringify({
              payload: event,
              timestamp: Date.now()
            })
          );
        } catch (_) {}
      }

      const packet = JSON.stringify({
        type: 'new_event',
        payload: event,
        timestamp: Date.now()
      });

      let published = 0;

      youtubeEventRelayClients.forEach(client => {
        try {
          if (client.connected) {
            client.publish(
              'apexscorpio/streamtools/v1/events',
              packet,
              {
                qos: 1,
                retain: false
              }
            );

            published += 1;
          }
        } catch (_) {}
      });

      if (published === 0 && attempt < 10) {
        setTimeout(
          () => relayYoutubeEvent(event, attempt + 1),
          1000
        );
      }
    }
    loadSavedConfig();
    applyConfig();

    // Start YouTube Live Chat (real messages from youtube.com/c/apexscorpio)
    if (typeof YoutubeLive !== 'undefined') {
      YoutubeLive.startChat(
        (msg) => {
          if (cfg.showYoutube) {
            addMsg(msg, 'youtube');
          }
        },
        relayYoutubeEvent
      );
    }
  </script>
</body>
</html>
