<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ApexScorpio - Alert Box Overlay</title>
  <link rel="stylesheet" href="css/style.css?v=8.0">
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5.3.4/dist/mqtt.min.js"></script>
  <script src="youtube-live.js?v=2.1"></script>
  <style>
    body{background:transparent;overflow:hidden;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh}
    .alert-box{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px 48px;background:rgba(8,8,12,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);--platform-accent:#E8181F;--platform-rgb:232,24,31;border:2px solid var(--platform-accent);border-radius:24px;box-shadow:0 10px 45px rgba(0,0,0,.95),0 0 40px rgba(var(--platform-rgb),.5);position:relative}
    .alert-box[data-platform="twitch"]{--platform-accent:#9146FF;--platform-rgb:145,70,255}.alert-box[data-platform="youtube"]{--platform-accent:#E8181F;--platform-rgb:232,24,31}.alert-box[data-platform="facebook"]{--platform-accent:#1877F2;--platform-rgb:24,119,242}
    .alert-box:before{content:"";position:absolute;top:-2px;left:26px;right:26px;height:4px;border-radius:0 0 4px 4px;background:var(--platform-accent);box-shadow:0 0 16px rgba(var(--platform-rgb),.85)}
    .alert-box.pop-in{display:flex!important;animation:alertPopIn .6s cubic-bezier(.175,.885,.32,1.275) forwards}.alert-box.pop-out{display:flex!important;animation:alertPopOut .6s cubic-bezier(.68,-.275,.825,.115) forwards!important}
    .alert-header-img{max-width:130px;max-height:110px;height:auto;margin-bottom:12px;filter:drop-shadow(0 0 15px rgba(232,24,31,.6))}.platform-logo-container{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}.alert-title{font-family:'Orbitron','Outfit',sans-serif;font-size:16px;font-weight:900;color:#E8181F;text-transform:uppercase;letter-spacing:2px}.alert-message{font-family:'Outfit',sans-serif;font-size:30px;font-weight:900;color:#fff;margin-top:6px}.alert-subtext{font-family:'Inter',sans-serif;font-size:15px;color:#94A3B8;margin-top:4px;display:flex;align-items:center;gap:6px}
    @keyframes alertPopIn{0%{opacity:0;transform:scale(.4) translateY(60px);filter:blur(10px)}70%{opacity:1;transform:scale(1.05) translateY(-5px);filter:blur(0)}100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}}
    @keyframes alertPopOut{0%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}30%{opacity:1;transform:scale(1.05) translateY(-5px);filter:blur(0)}100%{opacity:0;transform:scale(.4) translateY(60px);filter:blur(10px)}}
  </style>
</head>
<body>
  <div class="alert-box" id="alert-box">
    <img src="brandkit/Apex_Scorpio_Brand_Assets/03_Scorpion/Apex_Scorpion_Full_Metallic.png" class="alert-header-img" id="alert-img" alt="Apex Scorpio">
    <div class="platform-logo-container" id="logo-box"></div>
    <div class="alert-title" id="alert-title"></div>
    <div class="alert-message" id="alert-message"></div>
    <div class="alert-subtext" id="alert-subtext"></div>
  </div>
  <script src="alerts.js?v=2.0"></script>
</body>
</html>
