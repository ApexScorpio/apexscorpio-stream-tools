<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexScorpio - Stream Ending</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: #08080C;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #FFF;
      position: relative;
    }

    .bg-grid {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, rgba(232, 24, 31, 0.2) 0%, rgba(8, 8, 12, 0.98) 70%);
      z-index: 1;
    }

    .as-logo-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .as-logo-container img {
      max-width: 320px;
      height: auto;
      filter: drop-shadow(0 0 30px rgba(232, 24, 31, 0.8));
    }

    .scene-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: #E8181F;
      margin-top: 24px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 25px rgba(232, 24, 31, 0.9);
      z-index: 2;
    }

    .scene-subtitle {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      color: #94A3B8;
      margin-top: 8px;
      font-weight: 600;
      letter-spacing: 1px;
      z-index: 2;
    }

    .social-footer {
      position: absolute;
      bottom: 40px;
      z-index: 2;
      display: flex;
      gap: 24px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #94A3B8;
    }

    .social-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 8px 18px;
      border-radius: 30px;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="as-logo-container">
    <img src="/brandkit/Apex_Scorpio_Brand_Assets/01_Primary/Apex_Scorpio_Primary_Full_Colour.png" alt="Apex Scorpio">
  </div>

  <div class="scene-title">FIM DA TRANSMISSÃO • STREAM ENDING</div>
  <div class="scene-subtitle">OBRIGADO POR ASSISTIR E FAZER PARTE DA COMUNIDADE!</div>

  <div class="social-footer">
    <div class="social-item">🟣 Twitch: apexscorpio</div>
    <div class="social-item">🔴 YouTube: @apexscorpio</div>
    <div class="social-item">🔵 Facebook: apexscorpio</div>
  </div>
</body>
</html>
