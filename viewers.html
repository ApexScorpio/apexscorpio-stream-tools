<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>ApexScorpio - Viewers Counter Overlay</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5.3.4/dist/mqtt.min.js"></script>
</head>
<body class="viewers-page">
  <div class="viewers-container layout-horizontal has-bg" id="viewers-bar">
    <div class="viewer-pill twitch" id="pill-twitch">
      <span class="platform-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#FFF"><path d="M11.571 4.714h1.715v5.143H11.571V4.714zm4.715 0H18v5.143h-1.714V4.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0H6zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714v9.429z"/></svg>
      </span>
      <span class="status-dot" id="dot-twitch"></span>
      <span class="count-value" id="count-twitch">0</span>
    </div>

    <div class="viewer-pill youtube" id="pill-youtube">
      <span class="platform-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="#FFF"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      </span>
      <span class="status-dot" id="dot-youtube"></span>
      <span class="count-value" id="count-youtube">0</span>
    </div>

    <div class="viewer-pill facebook" id="pill-facebook">
      <span class="platform-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#FFF"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      </span>
      <span class="status-dot" id="dot-facebook"></span>
      <span class="count-value" id="count-facebook">0</span>
    </div>

    <div class="viewer-pill total" id="pill-total">
      <span class="platform-icon">⚡</span>
      <span class="count-value" id="count-total">0</span>
    </div>
  </div>

  <script>
    const bar = document.getElementById('viewers-bar');
    const pills = {
      twitch:   document.getElementById('pill-twitch'),
      youtube:  document.getElementById('pill-youtube'),
      facebook: document.getElementById('pill-facebook'),
      total:    document.getElementById('pill-total')
    };
    const counts = {
      twitch:   document.getElementById('count-twitch'),
      youtube:  document.getElementById('count-youtube'),
      facebook: document.getElementById('count-facebook'),
      total:    document.getElementById('count-total')
    };
    const dots = {
      twitch:   document.getElementById('dot-twitch'),
      youtube:  document.getElementById('dot-youtube'),
      facebook: document.getElementById('dot-facebook')
    };

    let cfg = {
      showTwitch: true, showYoutube: true, showFacebook: true, showTotal: true,
      showBg: true, layout: 'horizontal', fontSize: 15
    };

    let realState = {
      twitch:   { isLive: false, viewers: 0 },
      youtube:  { isLive: false, viewers: 0 },
      facebook: { isLive: false, viewers: 0 },
      totalViewers: 0
    };

    let isTestActive = false;
    let testTimer = null;

    function loadSavedConfig() {
      const p = new URLSearchParams(window.location.search);
      if (p.has('tw')) cfg.showTwitch = p.get('tw') === '1' || p.get('tw') === 'true';
      if (p.has('yt')) cfg.showYoutube = p.get('yt') === '1' || p.get('yt') === 'true';
      if (p.has('fb')) cfg.showFacebook = p.get('fb') === '1' || p.get('fb') === 'true';
      if (p.has('tot')) cfg.showTotal = p.get('tot') === '1' || p.get('tot') === 'true';
      if (p.has('bg')) cfg.showBg = p.get('bg') === '1' || p.get('bg') === 'true';
      if (p.has('layout')) cfg.layout = p.get('layout');
      if (p.has('fs')) cfg.fontSize = Number(p.get('fs')) || 15;

      try {
        const saved = localStorage.getItem('apex_cfg_viewers');
        if (saved && [...p.keys()].length === 0) {
          cfg = { ...cfg, ...JSON.parse(saved) };
        }
      } catch(e) {}
    }

    const bc = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('apex_scorpio_stream_tools') : null;

    function doResetToRealState() {
      isTestActive = false;
      if (testTimer) clearTimeout(testTimer);
      checkPublicTwitchLive();
    }

    function handleIncomingData(type, payload) {
      if (!type || !payload) return;
      if (type === 'config_update') {
        const config = payload.viewers || payload.config || payload;
        if (config) {
          cfg = { ...cfg, ...config };
          applyConfig();
        }
      }
      if (type === 'clear_viewers' || type === 'reset_viewers' || type === 'clear') {
        doResetToRealState();
        return;
      }
      if (type === 'status_update') {
        const state = payload.state || payload;
        if (state.isTest) {
          isTestActive = true;
          if (testTimer) clearTimeout(testTimer);
          renderStatus(state);

          const dur = (state.testDuration || 8) * 1000;
          testTimer = setTimeout(() => {
            doResetToRealState();
          }, dur);
        } else {
          doResetToRealState();
        }
      }
    }

    // Multi-Broker Cloud Relay (Port 443 HTTPS + 8000 + 8084)
    const MQTT_BROKERS = [
      'wss://broker.emqx.io:443/mqtt',
      'wss://broker.hivemq.com:8000/mqtt',
      'wss://broker.emqx.io:8084/mqtt'
    ];

    if (typeof mqtt !== 'undefined') {
      MQTT_BROKERS.forEach(url => {
        try {
          const mqttClient = mqtt.connect(url, {
            clientId: 'scorpio_viewers_' + Math.random().toString(16).substring(2, 8),
            connectTimeout: 4000,
            keepalive: 30
          });
          mqttClient.on('connect', () => {
            mqttClient.subscribe('apexscorpio/streamtools/v1/cfg/#');
            mqttClient.subscribe('apexscorpio/streamtools/v1/events/#');
          });
          mqttClient.on('message', (topic, message) => {
            try {
              const data = JSON.parse(message.toString());
              if (topic.includes('clear')) {
                doResetToRealState();
              } else if (topic.includes('/cfg/viewers')) {
                cfg = { ...cfg, ...data };
                applyConfig();
              } else if (data && (data.type || data.payload)) {
                handleIncomingData(data.type || data.payload?.type, data.payload || data);
              }
            } catch(err) {}
          });
        } catch(e) {}
      });
    }

    if (bc) {
      bc.onmessage = (e) => {
        if (e.data) handleIncomingData(e.data.type, e.data.data);
      };
    }

    window.addEventListener('message', (e) => {
      if (e.data) handleIncomingData(e.data.type, e.data.data || e.data);
    });

    window.addEventListener('storage', (e) => {
      if (e.key && e.key.startsWith('apex_event_') && e.newValue) {
        try {
          const parsed = JSON.parse(e.newValue);
          const type = e.key.replace('apex_event_', '');
          handleIncomingData(type, parsed.payload);
        } catch(err) {}
      }
    });

    function applyConfig() {
      pills.twitch.style.display   = cfg.showTwitch   ? 'inline-flex' : 'none';
      pills.youtube.style.display  = cfg.showYoutube  ? 'inline-flex' : 'none';
      pills.facebook.style.display = cfg.showFacebook ? 'inline-flex' : 'none';
      pills.total.style.display    = cfg.showTotal    ? 'inline-flex' : 'none';

      bar.className = 'viewers-container';
      bar.classList.add(cfg.layout === 'vertical' ? 'layout-vertical' : 'layout-horizontal');
      if (cfg.showBg) bar.classList.add('has-bg');
      else bar.classList.add('no-bg');

      document.querySelectorAll('.count-value').forEach(el => {
        el.style.fontSize = (cfg.fontSize || 15) + 'px';
      });
    }

    function renderStatus(state) {
      const fmt = (n) => (n || 0).toLocaleString('pt-PT');

      const animateCount = (el, newVal) => {
        const formatted = fmt(newVal);
        if (el.innerText !== formatted) {
          el.innerText = formatted;
          el.classList.remove('bump');
          void el.offsetWidth;
          el.classList.add('bump');
        }
      };

      if (state.twitch) {
        animateCount(counts.twitch, state.twitch.viewers);
        dots.twitch.classList.toggle('online', !!state.twitch.isLive);
      }
      if (state.youtube) {
        animateCount(counts.youtube, state.youtube.viewers);
        dots.youtube.classList.toggle('online', !!state.youtube.isLive);
      }
      if (state.facebook) {
        animateCount(counts.facebook, state.facebook.viewers);
        dots.facebook.classList.toggle('online', !!state.facebook.isLive);
      }

      animateCount(counts.total, state.totalViewers || 0);
    }

    // Direct Public Client-Side Twitch GQL Live Reader for channel apexscorpio
    async function checkPublicTwitchLive() {
      if (isTestActive) return;
      try {
        const resp = await fetch('https://gql.twitch.tv/gql', {
          method: 'POST',
          headers: {
            'Client-ID': 'kimne78kx3ncx6brgo4mv6wki5h1ko',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            query: `query ChannelShell($login: String!) { user(login: $login) { stream { viewersCount type } } }`,
            variables: { login: 'apexscorpio' }
          })
        });
        const data = await resp.json();
        const stream = data?.data?.user?.stream;

        if (stream && stream.type === 'live') {
          realState.twitch = { isLive: true, viewers: stream.viewersCount || 0 };
        } else {
          realState.twitch = { isLive: false, viewers: 0 };
        }

        realState.totalViewers = (realState.twitch.viewers || 0) + (realState.youtube.viewers || 0) + (realState.facebook.viewers || 0);
        if (!isTestActive) renderStatus(realState);
      } catch (err) {
        if (!isTestActive) renderStatus(realState);
      }
    }

    loadSavedConfig();
    applyConfig();
    checkPublicTwitchLive();
    setInterval(checkPublicTwitchLive, 25000);
  </script>
</body>
</html>
