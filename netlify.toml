[build]
  command = "echo Netlify build complete"
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/youtube-status"
  to = "/.netlify/functions/youtube-status"
  status = 200

[[redirects]]
  from = "/oauth/youtube/start"
  to = "/.netlify/functions/youtube-oauth-start"
  status = 200

[[redirects]]
  from = "/oauth/youtube/callback"
  to = "/.netlify/functions/youtube-oauth-callback"
  status = 200
[functions]
  node_bundler = "esbuild"


[[redirects]]
  from = "/youtube-chat"
  to = "/.netlify/functions/youtube-chat"
  status = 200
