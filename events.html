<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ApexScorpio - Event List Overlay</title>
  <link rel="stylesheet" href="css/style.css?v=6.2">
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5.3.4/dist/mqtt.min.js"></script>
  <script src="youtube-live.js"></script>
</head>
<body class="events-page">
  <div class="event-list-container has-bg" id="event-feed"></div>

  <script>
    const feed = document.getElementById('event-feed');

    let cfg = {
      showTwitch: true, showYoutube: true, showFacebook: true,
      showBg: true, showLogos: true, maxItems: 8
    };

    function loadSavedConfig() {
      const p = new URLSearchParams(window.location.search);
      if (p.has('tw')) cfg.showTwitch = p.get('tw') === '1' || p.get('tw') === 'true';
      if (p.has('yt')) cfg.showYoutube = p.get('yt') === '1' || p.get('yt') === 'true';
      if (p.has('fb')) cfg.showFacebook = p.get('fb') === '1' || p.get('fb') === 'true';
      if (p.has('logos')) cfg.showLogos = p.get('logos') === '1' || p.get('logos') === 'true';
      if (p.has('bg')) cfg.showBg = p.get('bg') === '1' || p.get('bg') === 'true';
      if (p.has('max')) cfg.maxItems = Number(p.get('max')) || 8;

      try {
        const saved = localStorage.getItem('apex_cfg_events');
        if (saved && [...p.keys()].length === 0) {
          cfg = { ...cfg, ...JSON.parse(saved) };
        }
      } catch(e) {}
    }

    const svgIcons = {
      twitch:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="#9146FF"><path d="M11.571 4.714h1.715v5.143H11.571V4.714zm4.715 0H18v5.143h-1.714V4.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0H6zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714v9.429z"/></svg>`,
      youtube:  `<svg width="17" height="17" viewBox="0 0 24 24" fill="#E8181F"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`,
      facebook: `<svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`,
    };

    const bc = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('apex_scorpio_stream_tools') : null;

    const _seenIds = new Set();
    function _isDuplicate(type, payload) {
      const key = type + '|' + (payload?.id || '') + '|' + (payload?.username || '') + '|' + (payload?.type || '');
      if (_seenIds.has(key)) return true;
      _seenIds.add(key);
      setTimeout(() => _seenIds.delete(key), 3000);
      return false;
    }

    function doClearEvents(onlyTests = true) {
      const container = document.getElementById('event-feed') || feed;
      if (container) {
        Array.from(container.children).forEach(child => {
          if (!onlyTests || child.classList.contains('is-test-msg')) {
            child.style.animation = 'none';
            child.style.transition = 'none';
            child.remove();
          }
        });
        if (!onlyTests) {
          container.innerHTML = '';
          while (container.firstChild) {
            container.removeChild(container.firstChild);
          }
        }
      }
      _seenIds.clear();
    }

    function handleIncomingData(type, payload) {
      if (!type) return;
      const typeStr = String(type).toLowerCase();
      if (typeStr.includes('clear')) {
        doClearEvents(true);
        return;
      }
      if (type === 'config_update') {
        const config = payload.events || payload.config || payload;
        if (config) {
          cfg = { ...cfg, ...config };
          applyConfig();
        }
      }
      if (type === 'new_event' && payload) {
        if (_isDuplicate(type, payload?.event || payload)) return;
        const event = payload.event || payload;
        const platform = (event.platform || 'twitch').toLowerCase();
        if (platform === 'twitch'   && !cfg.showTwitch)   return;
        if (platform === 'youtube'  && !cfg.showYoutube)  return;
        if (platform === 'facebook' && !cfg.showFacebook) return;
        addCard(event, platform);
      }
    }

    // Multi-Broker Cloud Relay (Port 443 HTTPS + 8000 + 8084)
    const MQTT_BROKERS = [
      'wss://broker.emqx.io:443/mqtt',
      'wss://broker.hivemq.com:8000/mqtt',
      'wss://broker.emqx.io:8084/mqtt'
    ];

    if (typeof mqtt !== 'undefined') {
      MQTT_BROKERS.forEach(url => {
        try {
          const mqttClient = mqtt.connect(url, {
            clientId: 'scorpio_events_' + Math.random().toString(16).substring(2, 8),
            connectTimeout: 4000,
            keepalive: 30
          });
          mqttClient.on('connect', () => {
            mqttClient.subscribe('apexscorpio/streamtools/v1/#');
          });
          mqttClient.on('message', (topic, message) => {
            try {
              const data = JSON.parse(message.toString());
              const topicStr = String(topic).toLowerCase();
              const dataStr = JSON.stringify(data).toLowerCase();

              if (topicStr.includes('clear') || dataStr.includes('clear')) {
                if (topicStr.includes('clear_events') || dataStr.includes('clear_events') || topicStr.includes('clear_all') || dataStr.includes('clear_all') || data.type === 'clear_events') {
                  doClearEvents(true);
                  return;
                }
              }

              if (topicStr.includes('/cfg/events')) {
                cfg = { ...cfg, ...data };
                applyConfig();
              } else if (data && (data.type || data.payload)) {
                handleIncomingData(data.type || data.payload?.type, data.payload || data);
              }
            } catch(err) {}
          });
        } catch(e) {}
      });
    }

    if (bc) {
      bc.onmessage = (e) => {
        if (e.data) handleIncomingData(e.data.type, e.data.data);
      };
    }

    window.addEventListener('message', (e) => {
      if (e.data) handleIncomingData(e.data.type, e.data.data || e.data);
    });

    window.addEventListener('storage', (e) => {
      if (e.key && e.key.startsWith('apex_event_') && e.newValue) {
        try {
          const parsed = JSON.parse(e.newValue);
          const type = e.key.replace('apex_event_', '');
          handleIncomingData(type, parsed.payload);
        } catch(err) {}
      }
    });

    function applyConfig() {
      if (cfg.showBg) {
        feed.classList.add('has-bg');
        feed.classList.remove('no-bg');
      } else {
        feed.classList.remove('has-bg');
        feed.classList.add('no-bg');
      }
      feed.querySelectorAll('.platform-logo-badge').forEach(b => {
        b.style.display = cfg.showLogos ? 'flex' : 'none';
      });
    }

    // Permanent events store in localStorage
    function saveEventsToStorage() {
      try {
        const eventsToSave = [];
        Array.from(feed.children).forEach(child => {
          if (!child.classList.contains('is-test-msg')) {
            eventsToSave.push(child.outerHTML);
          }
        });
        localStorage.setItem('apex_permanent_events', JSON.stringify(eventsToSave.slice(0, cfg.maxItems || 15)));
      } catch(e) {}
    }

    function restoreEventsFromStorage() {
      try {
        const saved = localStorage.getItem('apex_permanent_events');
        if (saved) {
          const list = JSON.parse(saved);
          feed.innerHTML = '';
          list.forEach(html => {
            const temp = document.createElement('div');
            temp.innerHTML = html;
            if (temp.firstElementChild) feed.appendChild(temp.firstElementChild);
          });
        }
      } catch(e) {}

      // Se a lista estiver vazia, povoar com X eventos com base no limite maxItems configurado
      if (feed.children.length === 0) {
        const defaultEvents = [
          { username: 'GamerGurl_99', type: 'subscriber', platform: 'youtube' },
          { username: 'ApexFanatic', type: 'follower', platform: 'twitch' },
          { username: 'StreamMaster', type: 'raid', viewers: 25, platform: 'twitch' },
          { username: 'PedroPro_007', type: 'follower', platform: 'twitch' },
          { username: 'ScorpioFan_PT', type: 'subscriber', platform: 'twitch' },
          { username: 'Racer_X', type: 'follower', platform: 'youtube' },
          { username: 'SpeedRunner', type: 'follower', platform: 'twitch' },
          { username: 'ProStreamer99', type: 'subscriber', platform: 'youtube' },
          { username: 'VIP_Member', type: 'subscriber', platform: 'twitch' },
          { username: 'GamerZone', type: 'raid', viewers: 18, platform: 'twitch' }
        ];

        const targetCount = Math.min(cfg.maxItems || 8, defaultEvents.length);
        for (let i = 0; i < targetCount; i++) {
          addCard(defaultEvents[i], defaultEvents[i].platform);
        }
        saveEventsToStorage();
      }
    }

    function addCard(event, platform) {
      const platName = { twitch:'Twitch', youtube:'YouTube', facebook:'Facebook' }[platform] || 'Twitch';

      let typeEmoji = '🔔', action = `followed on ${platName}`, evtClass = 'follower';
      if (event.type === 'subscriber') { typeEmoji = '⭐'; action = `subscribed on ${platName}`; evtClass = 'subscriber'; }
      if (event.type === 'raid')       { typeEmoji = '🚀'; action = `raided with ${event.viewers||15} viewers`; evtClass = 'raid'; }

      const testClass = event.isTest ? 'is-test-msg' : '';
      const card = document.createElement('div');
      card.className = `event-card ${evtClass} platform-${platform} ${testClass}`;
      card.innerHTML = `
        <div class="platform-logo-badge ${platform}" style="display:${cfg.showLogos ? 'flex' : 'none'}">
          ${svgIcons[platform] || svgIcons.twitch}
        </div>
        <div class="event-info">
          <div class="event-user">@${event.username} ${typeEmoji}</div>
          <div class="event-action">${action}</div>
        </div>
      `;

      feed.insertBefore(card, feed.firstChild);

      while (feed.children.length > (cfg.maxItems || 15)) {
        const oldest = feed.lastChild;
        if (oldest) {
          oldest.classList.add('removing');
          setTimeout(() => oldest.remove(), 380);
          break;
        }
      }

      if (!event.isTest) {
        saveEventsToStorage();
      } else {
        // Auto-expire test events after 8 seconds
        setTimeout(() => {
          card.style.animation = 'none';
          card.classList.add('removing');
          setTimeout(() => {
            card.remove();
            saveEventsToStorage();
          }, 380);
        }, 8000);
      }
    }

    loadSavedConfig();
    restoreEventsFromStorage();
    applyConfig();

    // YouTube Live: show superchats and new members as events
    if (typeof YoutubeLive !== 'undefined') {
      YoutubeLive.startChat(
        null, // chat messages handled by chat.html
        (evt) => { if (cfg.showYoutube) addCard(evt, 'youtube'); }
      );
    }
  </script>
</body>
</html>
